 <!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#f8f5f0,#f3e7d9);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:600px;
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    text-align:center;
    position:relative;
    overflow:hidden;
    animation:fadeIn 2s ease;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
      url('weddingTemplate1.jpg') center/cover no-repeat;
    z-index:0;
}



.content{
    position:relative;
    z-index:1;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:36px;
    margin-bottom:10px;
    animation:slideDown 1.5s ease;
}

.guest{
    margin-bottom:20px;
    font-size:18px;
    color:#555;
}

.names{
    font-family:'Playfair Display',serif;
    font-size:32px;
    color:#b8860b;
    margin:15px 0;
    animation:pulse 2s infinite;
}

.heart{
    color:red;
    animation:beat 1s infinite;
}

.details{
    margin-top:20px;
    line-height:1.8;
    font-size:16px;
}

#bg {
  position: fixed;
  top:0;
  left:0;
  width: 100%;
  height: 100%;
  background: url('weddingTemplate1.jpg') center/cover no-repeat;
  z-index: -1;
  transition: opacity 0.8s ease-in-out;
}


button{
    margin-top:25px;
    padding:10px 25px;
    border:none;
    border-radius:30px;
    background:#b8860b;
    color:white;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}

button:hover{
    background:#8b6508;
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);} 
    to{opacity:1; transform:scale(1);} 
}

@keyframes slideDown{
    from{opacity:0; transform:translateY(-30px);} 
    to{opacity:1; transform:translateY(0);} 
}

@keyframes pulse{
    0%{transform:scale(1);} 
    50%{transform:scale(1.05);} 
    100%{transform:scale(1);} 
}

@keyframes beat{
    0%,100%{transform:scale(1);} 
    50%{transform:scale(1.3);} 
}

.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:red;
    top:-10px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(360deg);} 
}

</style>
</head>
<body>
<div id="bg"></div> 
<div class="card" >
    <div class="content">
        <h1>Wedding Invitation</h1>
        <div class="guest" id="guestName">
Dear Sneha And Dipok</div>
        <div class="names">Shahrukh<span class="heart">❤</span> Kazol</div>
        <p>You are cordially invited to celebrate our wedding.</p>
        <div class="details">
            📅 25 December 2026 <br>
            ⏰ 7:00 PM <br>
            📍 Dhaka Convention Hall
        </div>
      <!--  <button onclick="showMessage()">Click for Surprise</button> -->
    </div>
</div>
<script>

const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){
  document.getElementById("guestName").innerText = "Dear " + name;
}

//--
let images = ["weddingTemplate1.jpg", "w2.png"];
let i = 0;

function changeBg() {
  let bg = document.getElementById("bg");

  bg.style.opacity = 0;

  setTimeout(() => {
    bg.style.backgroundImage = `url('${images[i]}')`;
    bg.style.opacity = 1;

    i = (i + 1) % images.length;
  }, 1000);
}

// প্রথমে start করুন
changeBg();

// তারপর loop করুন
setInterval(changeBg, 4000);

// Confetti effect
for(let i=0;i<30;i++){
    let conf=document.createElement('div');
    conf.classList.add('confetti');
    conf.style.left=Math.random()*100+'%';
    conf.style.backgroundColor=`hsl(${Math.random()*360},70%,60%)`;
    conf.style.animationDuration=(Math.random()*3+2)+'s';
    document.body.appendChild(conf);
}



</script></body>
</html>
