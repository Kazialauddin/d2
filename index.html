<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5f5f5;
  font-family: Arial;
}

/* Envelope */
.envelope {
  position: relative;
  width: 300px;
  height: 200px;
  background: #e0c3a3;
  cursor: pointer;
  perspective: 1000px;
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #d4a373;
  transform-origin: top;
  transition: 0.8s;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
}

/* Card inside */
.card {
  position: absolute;
  width: 260px;
  height: 360px;
  background: white;
  top: 50%;
  left: 50%;
  transform: translate(-50%, 20%);
  transition: 1s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  overflow: hidden;
}

/* Your invitation image */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Open effect */
.envelope.open .flap {
  transform: rotateX(180deg);
}

.envelope.open .card {
  transform: translate(-50%, -120%);
}
</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope(this)">
  <div class="flap"></div>

  <div class="card">
    <!-- এখানে আপনার image বসান -->
    <img src="invitation.png" alt="Wedding Card">
  </div>
</div>

<script>
function openEnvelope(el){
  el.classList.toggle("open");
}
</script>

</body>
</html>
