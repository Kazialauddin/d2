<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5f5f5;
  font-family: 'Georgia', serif;
}

/* Envelope */
.envelope {
  position: relative;
  width: 320px;
  height: 220px;
  background: #e0c3a3;
  cursor: pointer;
  perspective: 1000px;
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #d4a373;
  transform-origin: top;
  transition: 0.8s;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
}

/* Card */
.card {
  position: absolute;
  width: 280px;
  height: 400px;
  background: white;
  top: 50%;
  left: 50%;
  transform: translate(-50%, 20%);
  transition: 1s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  padding: 20px;
  text-align: center;
}

/* Invitation Content */
.title {
  font-size: 22px;
  margin-bottom: 10px;
}

.names {
  font-size: 20px;
  color: crimson;
  margin: 10px 0;
}

.guest {
  font-size: 16px;
  margin: 15px 0;
  font-weight: bold;
}

/* Open Animation */
.envelope.open .flap {
  transform: rotateX(180deg);
}

.envelope.open .card {
  transform: translate(-50%, -120%);
}
</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope(this)">
  <div class="flap"></div>

  <div class="card">
    <div class="title">Wedding Invitation</div>

    <div class="guest">Dear <span id="guestName">Guest</span></div>

    <div class="names">Rahim ❤️ Subaita</div>

    <p>You are cordially invited to our wedding.</p>

    <p>📅 25 December 2026</p>
    <p>⏰ 7:00 PM</p>
    <p>📍 Dhaka Convention Hall</p>
  </div>
</div>

<script>
// URL থেকে নাম নেওয়া
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

// Set name
if(name){
  document.getElementById("guestName").innerText = name;
}
window.onload = () => {
  document.querySelector(".envelope").classList.add("open");
}
// Envelope open
function openEnvelope(el){
  el.classList.toggle("open");
}
</script>

</body>
</html>
